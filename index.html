<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Дипломный проект - Маршруты</title>

    <!-- Leaflet CSS -->
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        /* Стили боковой панели в стиле современного приложения */
        .route-card {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            width: 320px;
            max-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-header {
            padding: 20px;
            background: #2d3436;
            color: white;
        }

        .card-header h2 {
            margin: 0;
            font-size: 18px;
        }

        .card-header p {
            margin: 5px 0 0;
            font-size: 13px;
            opacity: 0.8;
        }

        .steps-container {
            overflow-y: auto;
            padding: 10px 20px;
        }

        .step {
            display: flex;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .step:last-child {
            border-bottom: none;
        }

        .step-icon {
            min-width: 24px;
            height: 24px;
            background: #e1f5fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 12px;
            color: #039be5;
        }

        .step-info {
            font-size: 14px;
            color: #2d3436;
        }

        .step-dist {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 4px;
        }

        /* Стили для кастомных маркеров */
        .custom-marker {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 2px white solid;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="route-card">
    <div class="card-header">
        <h2>Маршрут: Березинский</h2>
        <p id="summary">Загрузка данных...</p>
    </div>
    <div class="steps-container" id="steps">
        <!-- Сюда попадут шаги из скрипта -->
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Инициализация карты (Минск для примера)
    const map = L.map('map').setView([53.90, 27.56], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 2. Моковые данные (как будто пришли от OpenRouteService)
    const mockRouteGeoJSON = {
        "type": "Feature",
        "geometry": {
            "type": "LineString",
            "coordinates": [
                [27.561, 53.902],
                [27.565, 53.905],
                [27.575, 53.912],
                [27.590, 53.920],
                [27.600, 53.925]
            ]
        },
        "properties": {
            "summary": {"distance": 4200, "duration": 650},
            "steps": [
                {"instruction": "Начните движение на север по ул. Ленина", "dist": "500 м"},
                {"instruction": "Поверните направо на проспект Независимости", "dist": "2.1 км"},
                {"instruction": "Держитесь левее в сторону парка", "dist": "1.6 км"},
                {"instruction": "Вы прибыли в пункт назначения", "dist": "0 м"}
            ]
        }
    };

    // 3. Отрисовка маршрута
    const coords = mockRouteGeoJSON.geometry.coordinates.map(c => [c[1], c[0]]);

    const routeLine = L.polyline(coords, {
        color: '#00b894', // Тот самый "эко" зеленый
        weight: 6,
        opacity: 0.8,
        lineJoin: 'round'
    }).addTo(map);

    map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});

    // 4. Кастомные маркеры (Старт и Финиш)
    const startMarker = L.divIcon({
        className: 'custom-marker',
        html: '<div style="background: #0984e3; width:12px; height:12px; border-radius:50%;"></div>',
        iconSize: [16, 16]
    });

    const endMarker = L.divIcon({
        className: 'custom-marker',
        html: '<div style="background: #d63031; width:12px; height:12px; border-radius:50%;"></div>',
        iconSize: [16, 16]
    });

    L.marker(coords[0], {icon: startMarker}).addTo(map);
    L.marker(coords[coords.length - 1], {icon: endMarker}).addTo(map);

    // 5. Заполнение боковой панели
    document.getElementById('summary').innerText = `Дистанция: ${(mockRouteGeoJSON.properties.summary.distance / 1000).toFixed(1)} км • Время: ~12 мин`;

    const stepsContainer = document.getElementById('steps');
    mockRouteGeoJSON.properties.steps.forEach(step => {
        const stepDiv = document.createElement('div');
        stepDiv.className = 'step';
        stepDiv.innerHTML = `
            <div class="step-icon">○</div>
            <div class="step-info">
                <div>${step.instruction}</div>
                <div class="step-dist">${step.dist}</div>
            </div>
        `;
        stepsContainer.appendChild(stepDiv);
    });

</script>

</body>
</html>
